name: Daily Refresh

on:
  schedule:
    # GitHub Actions cron è UTC. 07:00 Europe/Rome = 05:00 UTC (DST) / 06:00 UTC (winter).
    # Scheduliamo entrambi e lo step "Check local time" salta il run sbagliato.
    - cron: "0 5 * * *"
    - cron: "0 6 * * *"
  workflow_dispatch: {}

concurrency:
  group: daily-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      issues: write
    steps:
      - name: Check local time
        id: time_check
        run: |
          HOUR=$(TZ=Europe/Rome date +%H)
          echo "current Rome hour: $HOUR"
          if [ "$HOUR" != "07" ] && [ "${{ github.event_name }}" != "workflow_dispatch" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
          fi

      - name: Checkout
        if: steps.time_check.outputs.skip != 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Python
        if: steps.time_check.outputs.skip != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Setup Node
        if: steps.time_check.outputs.skip != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        if: steps.time_check.outputs.skip != 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          python -m playwright install --with-deps chromium
          npm install

      - name: Build Tailwind CSS
        if: steps.time_check.outputs.skip != 'true'
        run: npx @tailwindcss/cli -i ./tailwind_input.css -o ./site/tailwind.css --minify

      - name: Run refresh
        if: steps.time_check.outputs.skip != 'true'
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          TZ: Europe/Rome
        run: python -m osservatorio_seo refresh

      - name: Commit and push
        if: steps.time_check.outputs.skip != 'true'
        run: |
          git config user.name "osservatorioseo-bot"
          git config user.email "bot@osservatorioseo.local"
          # Stage sia data/ che tutto site/ (include HTML SSG generati in site/archivio/,
          # site/docs/, site/categoria/, site/tag/, site/top-settimana/, ecc.)
          git add data/ site/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore(feed): refresh $(TZ=Europe/Rome date +%Y-%m-%d)"
            # Retry on conflict con rebase (race condition con push manuali)
            for i in 1 2 3; do
              if git push 2>&1; then
                echo "push success on attempt $i"
                exit 0
              fi
              echo "push failed on attempt $i, rebasing…"
              git pull --rebase origin main || exit 1
            done
            echo "push failed after 3 attempts"
            exit 1
          fi

      - name: Deploy to Cloudflare Pages
        if: steps.time_check.outputs.skip != 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx --yes wrangler@4 pages deploy ./site \
            --project-name=osservatorioseo \
            --branch=main \
            --commit-hash="$GITHUB_SHA" \
            --commit-message="refresh $(TZ=Europe/Rome date +%Y-%m-%d)"

      - name: Open issue on failure
        if: failure() && steps.time_check.outputs.skip != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const date = new Date().toISOString().split('T')[0];
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[osservatorioseo] Workflow failed ${date}`,
              body: `Daily refresh failed on ${date}.\n\nSee run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              labels: ['bug', 'automated']
            });
