name: Google Financials weekly check

on:
  schedule:
    # Every Monday at 10:00 UTC (after tracker update at 07:00)
    - cron: "0 10 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-financials:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Node (for Tailwind CLI)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Python deps
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -e ".[dev]"

      - name: Install Node deps (Tailwind CLI)
        run: npm install

      - name: Check for new filings and update
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          .venv/bin/python scripts/update_google_financials.py

      - name: Rebuild Tailwind CSS
        run: npx @tailwindcss/cli -i ./tailwind_input.css -o ./site/tailwind.css --minify

      - name: Rebuild SSG HTML
        run: .venv/bin/python scripts/rebuild_seo_html.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/google_financials site/google-financials site/sitemap.xml site/tailwind.css site/index.html
          if git diff --staged --quiet; then
            echo "No new filings found — nothing to commit"
          else
            git commit -m "chore(financials): weekly SEC EDGAR check"
            for i in 1 2 3; do
              git push && break
              git pull --rebase origin main
            done
          fi

      - name: Deploy to Cloudflare Pages
        if: success()
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx wrangler pages deploy ./site \
            --project-name=osservatorioseo \
            --branch=main \
            --commit-hash="$(git rev-parse HEAD)" \
            --commit-message="google financials update" \
            --commit-dirty=true
