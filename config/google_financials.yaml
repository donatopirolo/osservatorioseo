# Google Financials SEO Analyzer — company configurations.
#
# Architecture: multi-company ready.  Each company has its own CIK,
# XBRL namespace, and metric tag mapping.  Only enabled companies
# are polled by the weekly workflow.
#
# XBRL data sources:
#   us-gaap tags  → fetched via /api/xbrl/companyfacts (single request)
#   custom tags   → fetched via /api/xbrl/companyconcept (one per tag)

companies:
  - id: alphabet
    name: "Alphabet Inc."
    cik: "0001652044"
    enabled: true
    xbrl_namespace: goog
    filing_types:
      - "10-K"
      - "10-Q"
      - "8-K"
    metrics:
      # ── Revenue ──────────────────────────────────────────────────
      total_revenue:
        tags:
          - Revenues
          - RevenueFromContractWithCustomerExcludingAssessedTax
        namespace: us-gaap
        label_it: "Fatturato totale"

      # ── Note: Google-specific segment breakdowns (Search, YouTube,
      # Cloud, Other Bets, TAC) require extension tags in the `goog:`
      # namespace whose exact names change across filings and are not
      # reliably exposed via the companyconcept API. They are omitted
      # from v1; segment analysis will be re-added via dimensional
      # XBRL axes on `us-gaap:Revenues` in a future iteration.

      # ── Costs ────────────────────────────────────────────────────
      cost_of_revenue:
        tags:
          - CostOfRevenue
          - CostOfGoodsAndServicesSold
        namespace: us-gaap
        label_it: "Costo del venduto"

      # ── Profitability ────────────────────────────────────────────
      operating_income:
        tags:
          - OperatingIncomeLoss
        namespace: us-gaap
        label_it: "Reddito operativo"

      net_income:
        tags:
          - NetIncomeLoss
        namespace: us-gaap
        label_it: "Utile netto"

      # ── Investment ───────────────────────────────────────────────
      capital_expenditures:
        tags:
          - PaymentsToAcquirePropertyPlantAndEquipment
        namespace: us-gaap
        label_it: "Investimenti (CapEx)"

      research_and_development:
        tags:
          - ResearchAndDevelopmentExpense
        namespace: us-gaap
        label_it: "Spese R&D"

  # ── Predisposte per il futuro (disabilitate) ──────────────────
  - id: meta
    name: "Meta Platforms Inc."
    cik: "0001326801"
    enabled: false
    xbrl_namespace: meta
    filing_types:
      - "10-K"
      - "10-Q"
    metrics: {}

  - id: microsoft
    name: "Microsoft Corp."
    cik: "0000789019"
    enabled: false
    xbrl_namespace: msft
    filing_types:
      - "10-K"
      - "10-Q"
    metrics: {}
