    type: html
    category: google_docs_change
    importance: 5

  - id: google_quality_rater_guidelines
    name: "Google Quality Rater Guidelines (PDF, IT)"
    url: https://static.googleusercontent.com/media/guidelines.raterhub.com/it//searchqualityevaluatorguidelines.pdf
